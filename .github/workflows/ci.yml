name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        if: matrix.python-version == '3.11'
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            python -m pip install -r requirements-dev.lock
            python -m pip install -e ".[notebooks]" --constraint requirements-dev.lock
          else
            python -m pip install -e ".[dev,notebooks]"
          fi

      - name: Ruff
        run: ruff check .

      - name: Ruff expanded rules
        if: matrix.python-version == '3.11'
        run: |
          ruff check \
            src/tollama/connectors/postgresql.py \
            src/tollama/client/http.py \
            src/tollama/runners/common_protocol.py \
            src/tollama/core/env.py \
            src/tollama/core/errors.py \
            --select B,SIM,RUF
          ruff check \
            src/tollama/connectors/postgresql.py \
            src/tollama/daemon/supervisor.py \
            src/tollama/daemon/app.py \
            --select S

      - name: Mypy
        if: matrix.python-version == '3.11'
        run: mypy

      - name: Verify dev lock freshness
        if: matrix.python-version == '3.11'
        run: |
          uv pip compile \
            pyproject.toml \
            --extra dev \
            --custom-compile-command "uv pip compile pyproject.toml --extra dev -o requirements-dev.lock" \
            -o /tmp/requirements-dev.lock
          diff -u requirements-dev.lock /tmp/requirements-dev.lock

      - name: Pre-commit
        if: matrix.python-version == '3.11'
        run: SKIP=no-commit-to-branch pre-commit run --all-files

      - name: Security scan
        if: matrix.python-version == '3.11'
        run: |
          bandit -r src/tollama -x tests -ll
          pip-audit

      - name: Verify OpenAPI artifact
        if: matrix.python-version == '3.11'
        run: |
          python scripts/export_openapi.py --output docs/openapi.json
          git diff --exit-code docs/openapi.json

      - name: Validate OpenClaw tollama-forecast skill
        run: bash scripts/validate_openclaw_skill_tollama_forecast.sh

      - name: Concrete solution smoke gate
        run: |
          bash -n examples/core_concrete_solution_demo.sh
          python scripts/e2e_realdata/export_core_solution_input.py --help
          PYTHONPATH=src pytest -q \
            tests/test_core_demo_script.py \
            tests/test_checked_in_core_solution_input.py \
            tests/test_checked_in_core_solution_expected_output.py \
            tests/test_concrete_solution_demo_script.py \
            tests/test_e2e_realdata_export_core_solution_input.py \
            tests/test_core_benchmark_artifacts.py \
            tests/test_routing.py

      - name: Pytest with coverage
        if: matrix.python-version == '3.11'
        env:
          TOLLAMA_VALIDATE_REGISTRY_REMOTE: "1"
        run: pytest --cov=tollama --cov-fail-under=64 --cov-report=term-missing --cov-report=xml

      - name: Pytest
        if: matrix.python-version != '3.11'
        env:
          TOLLAMA_VALIDATE_REGISTRY_REMOTE: "1"
        run: pytest -q

      - name: Execute tutorial notebooks
        if: matrix.python-version == '3.11'
        run: |
          mkdir -p /tmp/tollama-notebooks
          for nb in \
            examples/tutorial_covariates.ipynb \
            examples/tutorial_comparison.ipynb \
            examples/tutorial_what_if.ipynb \
            examples/tutorial_auto_forecast.ipynb; do
            jupyter nbconvert --to notebook --execute "$nb" \
              --output-dir /tmp/tollama-notebooks \
              --ExecutePreprocessor.timeout=900
          done
