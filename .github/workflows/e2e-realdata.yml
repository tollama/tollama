name: E2E Real Data TSFM

on:
  pull_request:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: nightly
        type: choice
        options:
          - pr
          - nightly
          - local

jobs:
  determine:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
      models: ${{ steps.resolve.outputs.models }}
      should_aggregate: ${{ steps.resolve.outputs.should_aggregate }}
    steps:
      - name: Resolve mode and model matrix
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode || '' }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          event_name = os.environ["EVENT_NAME"]
          input_mode = os.environ.get("INPUT_MODE", "").strip().lower()

          if event_name == "pull_request":
              mode = "pr"
              models = ["chronos2", "timesfm-2.5-200m"]
              should_aggregate = "false"
          elif event_name == "workflow_dispatch" and input_mode == "pr":
              mode = "pr"
              models = ["chronos2", "timesfm-2.5-200m"]
              should_aggregate = "false"
          elif event_name == "workflow_dispatch" and input_mode == "local":
              mode = "local"
              models = [
                  "chronos2",
                  "granite-ttm-r2",
                  "timesfm-2.5-200m",
                  "moirai-2.0-R-small",
                  "sundial-base-128m",
                  "toto-open-base-1.0",
              ]
              should_aggregate = "true"
          else:
              mode = "nightly"
              models = [
                  "chronos2",
                  "granite-ttm-r2",
                  "timesfm-2.5-200m",
                  "moirai-2.0-R-small",
                  "sundial-base-128m",
                  "toto-open-base-1.0",
              ]
              should_aggregate = "true"

          print(f"mode={mode}")
          print(f"models={json.dumps(models)}")
          print(f"should_aggregate={should_aggregate}")
          PY

  run-model:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: determine
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.determine.outputs.models) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve runner extra
        id: resolve-extra
        run: |
          extra="$(python scripts/e2e_realdata/resolve_runner_extra.py --model "${{ matrix.model }}")"
          echo "extra=${extra}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,${{ steps.resolve-extra.outputs.extra }}]"

      - name: Start daemon
        run: |
          tollamad > /tmp/tollamad.log 2>&1 &
          echo $! > /tmp/tollamad.pid

      - name: Wait for daemon
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:11435/v1/health > /dev/null || \
               curl -sf http://127.0.0.1:11435/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "daemon did not become ready"
          cat /tmp/tollamad.log || true
          exit 1

      - name: Run real-data E2E for model
        env:
          TOLLAMA_HF_TOKEN: ${{ secrets.TOLLAMA_HF_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          python scripts/e2e_realdata/run_tsfm_realdata.py \
            --mode "${{ needs.determine.outputs.mode }}" \
            --model "${{ matrix.model }}" \
            --base-url "http://127.0.0.1:11435" \
            --gate-profile "strict" \
            --output-dir "artifacts/realdata/${{ matrix.model }}"

      - name: Stop daemon
        if: always()
        run: |
          if [[ -f /tmp/tollamad.pid ]]; then
            kill "$(cat /tmp/tollamad.pid)" || true
          fi

      - name: Upload model artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: realdata-${{ matrix.model }}
          path: artifacts/realdata/${{ matrix.model }}
          if-no-files-found: warn

  aggregate-nightly:
    runs-on: ubuntu-latest
    needs: [determine, run-model]
    if: always() && needs.determine.outputs.should_aggregate == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download model artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/realdata/collected
          pattern: realdata-*

      - name: Build aggregate summary
        run: |
          python scripts/e2e_realdata/summarize_report.py \
            --input-glob "artifacts/realdata/collected/**/result.json" \
            --output-dir "artifacts/realdata/aggregate"

      - name: Upload aggregate artifact
        uses: actions/upload-artifact@v7
        with:
          name: realdata-aggregate
          path: artifacts/realdata/aggregate
